<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cumple 🎂</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Playfair+Display&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Quicksand', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ffcad4, #f4acb7, #9d8189);
      background-size: 400% 400%;
      animation: fondo 12s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    @keyframes fondo {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .screen {
      display: none;
      width: 90%;
      max-width: 420px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      flex-direction: column;
      align-items: center;
    }

    .active {
      display: flex;
      animation: fade 0.6s ease;
    }

    @keyframes fade {
      from {opacity:0; transform: translateY(20px);}
      to {opacity:1; transform: translateY(0);}
    }

    h1 {
      font-size: 18px;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
    }

    button {
      margin-top: 25px;
      padding: 12px 24px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #9d8189;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* COLLAGE AESTHETIC */
    .collage {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 8px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
      transform: rotate(-1deg);
      animation: aparecer 0.6s ease;
    }

    .card:nth-child(even) {
      transform: rotate(1deg);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .card p {
      font-size: 12px;
      margin-top: 6px;
      color: #444;
    }

    .mensaje-final {
      grid-column: span 2;
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      padding: 10px;
      background: rgba(255,255,255,0.8);
      border-radius: 10px;
    }

    @keyframes aparecer {
      from {opacity:0; transform: scale(0.8);}
      to {opacity:1; transform: scale(1);}
    }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      h1 { font-size: 16px; }
      .card p { font-size: 11px; }
    }
  </style>
</head>

<body>

<!-- AUDIOS -->
<audio id="audio1" src="tema1.mp3" loop></audio>
<audio id="audio2" src="tema2.mp3" loop></audio>

<!-- PANTALLA 1 -->
<div class="screen active">
  <h1>
    KANYEE, como estas??<br><br>
    Bueno este es mi regalito / mensajito pro de feliz cumpleaños 🎉
  </h1>

  <button onclick="next()">Continuar 😎</button>
</div>

<!-- PANTALLA 2 COLLAGE -->
<div class="screen">

  <h1>FELIZ CUMPLE 🎂</h1>

  <div class="collage">

    <div class="card">
      <img src="foto1.jpg">
      <p>la más copada del grupo 😎</p>
    </div>

    <div class="card">
      <img src="foto2.jpg">
      <p>la que le pone la mejor energía 🔥</p>
    </div>

    <div class="card">
      <img src="foto3.jpg">
      <p>la más loca lejos 😂</p>
    </div>

    <div class="card">
      <img src="foto4.jpg">
      <p>momentos god 🫶</p>
    </div>

    <div class="mensaje-final">
      y nada JAJAJAJAJA 😂<br>
      feliz cumple Caia, te quiero amiga ❤️
    </div>

  </div>

</div>

<script>
let current = 0;
const screens = document.querySelectorAll(".screen");

const audio1 = document.getElementById("audio1");
const audio2 = document.getElementById("audio2");

function next(){
  screens[current].classList.remove("active");
  current++;
  screens[current].classList.add("active");

  audio1.pause();
  audio1.currentTime = 0;
  audio2.play();
}

// iniciar música con interacción
document.body.addEventListener("click", () => {
  if(audio1.paused){
    audio1.play();
  }
}, { once: true });
</script>

</body>
</html>
