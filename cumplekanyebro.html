<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Cumple 🎂</title>

  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Patrick Hand', cursive;
    }

    body {
      margin: 0;
      height: 100vh;
      background: #f2efe9;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* FONDO CON MOVIMIENTO SUAVE */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: moveBg 20s linear infinite;
    }

    @keyframes moveBg {
      from { transform: translate(0,0); }
      to { transform: translate(-100px, -100px); }
    }

    .contenedor {
      position: relative;
      max-width: 350px;
      width: 90%;
      padding: 20px;
      z-index: 1;
    }

    /* TEXTO TIPO CARTA */
    .mensaje {
      font-size: 20px;
      color: #333;
      line-height: 1.6;
      transform: rotate(-2deg);
    }

    /* FOTO TIPO POLAROID */
    .foto {
      margin-top: 25px;
      background: white;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transform: rotate(3deg);
      transition: 0.3s;
    }

    .foto img {
      width: 100%;
      border-radius: 4px;
    }

    .foto:hover {
      transform: rotate(0deg) scale(1.05);
    }

    /* DETALLE CINTA */
    .tape {
      position: absolute;
      width: 80px;
      height: 20px;
      background: rgba(255,255,200,0.7);
      top: -10px;
      left: 50%;
      transform: translateX(-50%) rotate(-5deg);
      border-radius: 4px;
    }

    @media (max-width: 480px) {
      .mensaje {
        font-size: 18px;
      }
    }

  </style>
</head>

<body>

<div class="contenedor">

  <div class="mensaje">
    KANYEE, como estas??<br><br>
    Bueno este es mi mensajito pro de feliz cumpleaños 🎉<br><br>
    Feliz cumple a la más copada del grupo, a la más loca y a la que le pone la mejor energía a todo 🔥<br><br>
    Te quiero amiga 😎
  </div>

  <div class="foto">
    <div class="tape"></div>
    <img src="foto.jpg">
  </div>

</div>

</body>
</html>
