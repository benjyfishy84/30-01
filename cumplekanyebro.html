<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cumple 🎂</title>

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Quicksand', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #8EC5FC, #E0C3FC, #F9F586);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .screen {
      display: none;
      text-align: center;
      padding: 24px;
      width: 90%;
      max-width: 420px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      flex-direction: column;
      align-items: center;
    }

    .active {
      display: flex;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(30px);}
      to {opacity:1; transform: translateY(0);}
    }

    h1 {
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 12px 18px;
      border-radius: 15px;
      font-size: 18px;
      line-height: 1.5;
    }

    button {
      margin-top: 30px;
      padding: 14px 26px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #6a5acd;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.08);
    }

    img {
      width: 100%;
      border-radius: 16px;
      margin-top: 20px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    /* Confetti */
    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-100px); }
      100% { transform: translateY(100vh); }
    }
  </style>
</head>

<body>

<!-- AUDIOS -->
<audio id="audio1" src="tema1.mp3" loop></audio>
<audio id="audio2" src="tema2.mp3" loop></audio>

<div id="confetti-container"></div>

<!-- PANTALLA 1 -->
<div class="screen active">
  <h1>
    KANYEE, como estas?? <br><br>
    Bueno este es mi regalito / mensajito pro de feliz cumpleaños, algo diferente bro 🎉
  </h1>

  <button onclick="next()">Continuar 😎</button>
</div>

<!-- PANTALLA 2 -->
<div class="screen">
  <h1>
    FELIZ CUMPLE A LA MAS COPADARDA DEL GRUPO 🎉<br><br>
    a la que mas buena energia le pone a todo,<br>
    a la mas loca,<br><br>
    y nada JAJAJAJAJA 😂<br><br>
    Feliz cumple Caia te quiero amiga ❤️
  </h1>

  <img src="foto.jpg">
</div>

<script>
let current = 0;
const screens = document.querySelectorAll(".screen");

const audio1 = document.getElementById("audio1");
const audio2 = document.getElementById("audio2");

// cambiar pantalla + musica
function next(){
  screens[current].classList.remove("active");
  current++;
  screens[current].classList.add("active");

  audio1.pause();
  audio1.currentTime = 0;
  audio2.play();
}

// iniciar musica con primer click
document.body.addEventListener("click", () => {
  if(audio1.paused){
    audio1.play();
  }
}, { once: true });

// confetti
const container = document.getElementById("confetti-container");
const colors = ["#ff4d6d","#ffd166","#06d6a0","#118ab2","#ffffff"];

for(let i=0;i<100;i++){
  const c = document.createElement("div");
  c.classList.add("confetti");

  c.style.background = colors[Math.floor(Math.random()*colors.length)];
  c.style.left = Math.random()*100 + "vw";
  c.style.animationDuration = (3 + Math.random()*3) + "s";
  c.style.animationDelay = Math.random()*5 + "s";

  container.appendChild(c);
}
</script>

</body>
</html>
